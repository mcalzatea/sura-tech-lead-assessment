global:
  scrape_interval: 15s

scrape_configs:
  - job_name: demo-service
    static_configs:
      - targets: ["demo-service:8080"]
    metrics_path: /actuator/prometheus

  - job_name: flaky-upstream
    static_configs:
      - targets: ["flaky-upstream:8081"]
    metrics_path: /actuator/prometheus
